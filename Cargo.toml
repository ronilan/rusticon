[package]
name = "rusticon"
version = "0.2.3"
edition = "2021"

description = "Rusticon is a mouse driven SVG favicon editor for your terminal."
license = "CC-BY-NC-ND-4.0"
authors = ["Yaron (Ron) Ilan"]
homepage = "https://github.com/ronilan/rusticon"
repository = "https://github.com/ronilan/rusticon"
readme = "README.md"
keywords = ["favicon", "icon", "svg", "terminal", "image"]
categories = ["command-line-utilities", "graphics", "web-programming"]
exclude = ["examples", "media"]

[package.metadata.html]
title = "Rusticon"
description = "Rusticon is a mouse driven SVG favicon editor for your terminal."
keywords = "favicon, icon, svg, terminal, image"

[package.metadata.bundle]
app_name = "Rusticon"
binary_name = "rusticon_macos"
icon_source = "web/favicon.svg"

[lib]
crate-type = ["cdylib", "rlib"]
[features]
default = []
macos-native = [
    "incredible_elements/macos-native",
    "incredible_window_macos",
]

[dependencies]
image = "0.25.6"
incredible = { path = "../incredible/packages/incredible" }
incredible_elements = { path = "../incredible/packages/incredible_elements" }
incredible_helpers_layout = { path = "../incredible/packages/incredible_helpers_layout" }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
crossterm = { version = "0.29", features = ["event-stream"] }
futures = "0.3.31"
futures-timer = "3.0.3"
incredible_event_loop_terminal = { path = "../incredible/packages/incredible_event_loop_terminal" }
incredible_output_terminal = { path = "../incredible/packages/incredible_output_terminal" }
incredible_input_crossterm = { path = "../incredible/packages/incredible_input_crossterm" }
objc2 = { version = "0.6.4", features = ["std"] }
objc2-foundation = { version = "0.3.2", features = ["NSArray", "NSString", "NSURL", "NSPathUtilities"] }
objc2-app-kit = { version = "0.3.2", features = ["NSApplication", "NSWindow", "NSView", "NSSavePanel", "NSDragging", "NSPasteboard"] }

[target.'cfg(target_os = "macos")'.dependencies]
incredible_window_macos = { path = "../incredible/packages/incredible_window_macos", optional = true }
incredible_output_html = { path = "../incredible/packages/incredible_output_html" }
incredible_input_browser = { path = "../incredible/packages/incredible_input_browser" }
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
console_error_panic_hook = "0.1"
web-sys = { version = "0.3", features = [
    "Window",
    "Document",
    "HtmlElement",
    "HtmlAnchorElement",
    "Location",
    "Url",
    "UrlSearchParams",
    "Blob",
    "DragEvent",
    "DataTransfer",
    "DataTransferItem",
    "DataTransferItemList",
    "FileList",
    "File",
    "FileSystemFileHandle",
    "FileSystemWritableFileStream",
] }

[[bin]]
name = "rusticon"
path = "src/main.rs"

[[bin]]
name = "rusticon_macos"
path = "src/macos.rs"
required-features = ["macos-native"]

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1

[target.'cfg(target_arch = "wasm32")'.dependencies]
incredible_event_loop_browser = { path = "../incredible/packages/incredible_event_loop_browser" }
incredible_output_html = { path = "../incredible/packages/incredible_output_html" }
incredible_input_browser = { path = "../incredible/packages/incredible_input_browser" }
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
console_error_panic_hook = "0.1"
web-sys = { version = "0.3", features = [
    "Window",
    "Document",
    "HtmlElement",
    "HtmlAnchorElement",
    "Location",
    "Url",
    "UrlSearchParams",
    "Blob",
    "DragEvent",
    "DataTransfer",
    "DataTransferItem",
    "DataTransferItemList",
    "FileList",
    "File",
    "FileSystemFileHandle",
    "FileSystemWritableFileStream",
] }
