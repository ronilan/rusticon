name: Binaries

on:
  release:
    types: [published]
    
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cli:
    name: Build Terminal Binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - build: linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl

          - build: macos-intel
            os: macos-14
            target: x86_64-apple-darwin

          - build: macos-arm
            os: macos-latest
            target: aarch64-apple-darwin

          - build: windows
            os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Configure Git for Private Dependency
        run: |
          git config --global url."https://${{ secrets.INCREDIBLE_ALPHA }}@github.com/".insteadOf "https://github.com/"

      - name: Set version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        shell: bash
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package CLI
        shell: bash
        run: |
          BIN_NAME="rusticon"
          DIRNAME="${BIN_NAME}-${{ env.VERSION }}-${{ matrix.target }}"
          mkdir "$DIRNAME"

          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv "target/${{ matrix.target }}/release/$BIN_NAME.exe" "$DIRNAME/"
            7z a "$DIRNAME.zip" "$DIRNAME"
            echo "ASSET=$DIRNAME.zip" >> $GITHUB_ENV
          else
            mv "target/${{ matrix.target }}/release/$BIN_NAME" "$DIRNAME/"
            tar -czf "$DIRNAME.tar.gz" "$DIRNAME"
            echo "ASSET=$DIRNAME.tar.gz" >> $GITHUB_ENV
          fi

      - name: Upload CLI Release Assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}

      - name: Upload CLI Artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: ${{ env.ASSET }}

  build-dmg:
    name: Build macOS DMG (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
          - target: x86_64-apple-darwin
            arch: x64

    steps:
      - uses: actions/checkout@v4

      - name: Configure Git for Private Dependency
        run: |
          git config --global url."https://${{ secrets.INCREDIBLE_ALPHA }}@github.com/".insteadOf "https://github.com/"

      - name: Set version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME:-manual-build}" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install macOS deps
        run: |
          brew install librsvg
          npm install

      - name: Build macOS binary
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: cargo build --release --target ${{ matrix.target }} --bin rusticon_macos --features macos-native

      - name: Prepare DMG input
        run: |
          mkdir -p dist
          # bundle.js expects 'rusticon_macos' in dist/
          cp "target/${{ matrix.target }}/release/rusticon_macos" "dist/rusticon_macos"
          chmod +x "dist/rusticon_macos"

      - name: Build DMG
        run: node scripts/bundle.js --arch ${{ matrix.arch }}

      - name: Rename DMG for upload
        run: mv dist/Rusticon.dmg dist/rusticon-${{ matrix.arch }}.dmg

      - name: Upload DMG Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg

      - name: Upload DMG Artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: rusticon-dmg-${{ matrix.arch }}
          path: dist/rusticon-${{ matrix.arch }}.dmg