name: Binaries

on:
  release:
    types: [published]
    
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cli:
    name: Build CLI Binaries
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - build: linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl

          - build: macos-intel
            os: macos-13
            target: x86_64-apple-darwin

          - build: macos-arm
            os: macos-latest
            target: aarch64-apple-darwin

          - build: windows
            os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Configure Git for Private Dependency
        run: |
          git config --global url."https://${{ secrets.INCREDIBLE_ALPHA }}@github.com/".insteadOf "https://github.com/"

      - name: Set version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        shell: bash
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package CLI
        shell: bash
        run: |
          BIN_NAME=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].targets[0].name')
          DIRNAME="${BIN_NAME}-${{ env.VERSION }}-${{ matrix.target }}"
          mkdir "$DIRNAME"

          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv "target/${{ matrix.target }}/release/$BIN_NAME.exe" "$DIRNAME/"
            7z a "$DIRNAME.zip" "$DIRNAME"
            echo "ASSET=$DIRNAME.zip" >> $GITHUB_ENV
          else
            mv "target/${{ matrix.target }}/release/$BIN_NAME" "$DIRNAME/"
            tar -czf "$DIRNAME.tar.gz" "$DIRNAME"
            echo "ASSET=$DIRNAME.tar.gz" >> $GITHUB_ENV
          fi

      - name: Upload CLI Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}

  build-dmg:
    name: Build macOS DMG
    runs-on: macos-latest
    needs: build-cli

    steps:
      - uses: actions/checkout@v4

      - name: Configure Git for Private Dependency
        run: |
          git config --global url."https://${{ secrets.INCREDIBLE_ALPHA }}@github.com/".insteadOf "https://github.com/"

      - name: Set version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS deps
        run: |
          brew install librsvg
          npm install

      - name: Build macOS ARM binary (for DMG)
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: cargo build --release --target aarch64-apple-darwin

      - name: Prepare DMG input
        run: |
          mkdir -p dist
          BIN_NAME=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[0].targets[0].name')
          cp "target/aarch64-apple-darwin/release/$BIN_NAME" "dist/$BIN_NAME"
          chmod +x "dist/$BIN_NAME"

      - name: Build DMG
        run: node build.js

      - name: Upload DMG
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg